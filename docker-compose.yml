services:
  mysql:
    image: mysql:8.0
    container_name: school_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}  # From root .env
      MYSQL_DATABASE: ${DB_NAME}           # From root .env
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - school-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      timeout: 20s
      retries: 10
      interval: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: school_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env  # Loads backend-specific variables
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - school-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: school_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - school-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: school_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_PASSWORD}  # From root .env
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - school-network

volumes:
  mysql_data:
  backend_uploads:

networks:
  school-network:
    driver: bridge